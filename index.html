<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lista - Ricardo&Carol</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<div class="container">
<h2>🛒 Ricardo&Carol</h2>

<!-- Botões rápidos de produtos -->
<div class="card quick-buttons">
  <button onclick="quickAdd('Leite')"><i class="fas fa-cow"></i> Leite</button>
  <button onclick="quickAdd('Pão')"><i class="fas fa-bread-slice"></i> Pão</button>
  <button onclick="quickAdd('Ovos')"><i class="fas fa-egg"></i> Ovos</button>
  <button onclick="quickAdd('Arroz')"><i class="fas fa-seedling"></i> Arroz</button>
  <button onclick="quickAdd('Massa')"><i class="fas fa-utensils"></i> Massa</button>
</div>

<!-- Formulário de adicionar produtos -->
<div class="card">
  <input id="name" placeholder="Produto">
  <input id="qty" type="number" placeholder="Quantidade">
  <input id="price" type="number" placeholder="Preço">
  <select id="store">
    <option value="Action">Action</option>
    <option value="Continente">Continente</option>
    <option value="Lidl">Lidl</option>
    <option value="Mercadona">Mercadona</option>
    <option value="Pingo Doce">Pingo Doce</option>
  </select>
  <button onclick="addItem()">Adicionar</button>
  <button style="background:#ff3b30" onclick="clearList()">Apagar Lista</button>
  <button style="background:#ff9500" onclick="goHistory()">Histórico</button>
</div>

<!-- Lista de produtos -->
<div class="card">
  <h3>Lista</h3>
  <ul id="list"></ul>
  <div class="total" id="total"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebaseConfig.js"></script>
<script>
let user = sessionStorage.getItem("user");
if(!user){ window.location.href="login.html"; }

const itemsRef = db.collection("ricardoCarolApp").doc("lista").collection("items");
const historyRef = db.collection("ricardoCarolApp").doc("lista").collection("history");

// Adiciona produto
function addItem(nameManual){
  const name = nameManual||document.getElementById("name").value.trim();
  const qty = parseInt(document.getElementById("qty").value)||1;
  const price = parseFloat(document.getElementById("price").value)||0;
  const store = document.getElementById("store").value;
  if(!name) return;
  itemsRef.add({name, qty, price, store, addedBy:user, date:new Date()});
  if(!nameManual){ 
    document.getElementById("name").value="";
    document.getElementById("qty").value="";
    document.getElementById("price").value="";
  }
}
function quickAdd(name){ addItem(name); }
function clearList(){ if(confirm("Apagar toda a lista?")){ itemsRef.get().then(s=>s.forEach(d=>d.ref.delete())); } }
function goHistory(){ window.location.href="history.html"; }

itemsRef.onSnapshot(snap=>{
  const list=document.getElementById("list");
  list.innerHTML="";
  let total=0;
  snap.forEach(doc=>{
    const item=doc.data();
    total+=item.qty*item.price;
    const li=document.createElement("li");
    const colorClass="user-color-"+item.addedBy.replace(/ /g,"");
    li.innerHTML=`<div class="flex">
      <input type="checkbox" onclick="buyItem('${doc.id}')">
      <strong>${item.qty}x ${item.name}</strong>
      <span class="small">[${item.store}]</span>
    </div>
    <div class="flex">
      <input type="number" value="${item.price}" onchange="editPrice('${doc.id}',this.value)">
      <div class="small ${colorClass}">${item.addedBy}</div>
    </div>`;
    list.appendChild(li);
  });
  document.getElementById("total").innerText="Total: €"+total.toFixed(2);
});

// Marca como comprado e envia para histórico
function buyItem(id){
  itemsRef.doc(id).get().then(doc=>{
    const itemData = doc.data();
    historyRef.add({
      name: itemData.name,
      qty: itemData.qty,
      price: itemData.price,
      store: itemData.store,
      addedBy: itemData.addedBy,
      date: new Date()
    });
    itemsRef.doc(id).delete();
  });
}
function editPrice(id,newPrice){ itemsRef.doc(id).update({price:parseFloat(newPrice)||0}); }
</script>
</body>
</html>
