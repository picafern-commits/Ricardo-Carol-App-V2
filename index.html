<!DOCTYPE html>
<html lang="pt">
<head>
 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
 
<title>Ricardo&Carol</title>
 
<style>
 
body{
font-family:-apple-system;
background:#121212;
color:white;
margin:0;
padding:15px;
}
 
.container{
max-width:520px;
margin:auto;
}
 
.card{
background:#1e1e1e;
border-radius:16px;
padding:16px;
margin-bottom:15px;
}
 
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0a84ff;
color:white;
font-size:16px;
margin-top:8px;
}
 
input{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:10px;
background:#2c2c2e;
color:white;
}
 
ul{
list-style:none;
padding:0;
}
 
li{
background:#2c2c2e;
padding:12px;
border-radius:10px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
}
 
.small{
font-size:13px;
color:#aaa;
}
 
.total{
margin-top:10px;
font-weight:bold;
text-align:right;
}
 
</style>
 
</head>
 
<body>
 
<div class="container">
 
<h2>🛒 Ricardo&Carol</h2>
 
<div id="login" class="card">
 
<h3>Quem está a usar?</h3>
 
<button onclick="login('Ricardo')">Ricardo</button>
<button onclick="login('Carol')">Carol</button>
<button onclick="login('João')">João</button>
<button onclick="login('Maria')">Maria</button>
<button onclick="login('Pedro')">Pedro</button>
 
</div>
 
<div id="app" style="display:none">
 
<div class="card">
 
<input id="name" placeholder="Produto">
 
<input id="qty" type="number" placeholder="Quantidade">
 
<input id="price" type="number" placeholder="Preço">
 
<button onclick="addItem()">Adicionar</button>
 
</div>
 
<div class="card">
 
<h3>Lista</h3>
 
<ul id="list"></ul>
 
<div class="total" id="total"></div>
 
</div>
 
<div class="card">
 
<h3>Histórico</h3>
 
<div id="history"></div>
 
</div>
 
</div>
 
</div>
 
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
 
<script>
 
// COLOCAR CONFIG FIREBASE AQUI
 
const firebaseConfig = {
apiKey:"AIzaSyCqOp8DRQQI4JZSzOnX_4yl3TrhxT4m6S0",
authDomain:"ricardo-carol-app.firebaseapp.com",
projectId:"ricardo-carol-app"
};
 
firebase.initializeApp(firebaseConfig);
 
const db = firebase.firestore();
 
let user = localStorage.getItem("user");
 
function login(name){
 
user=name;
 
localStorage.setItem("user",name);
 
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
 
start();
 
}
 
if(user){
 
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
 
start();
 
}
 
function addItem(){
 
const name=document.getElementById("name").value.trim();
const qty=parseInt(document.getElementById("qty").value)||1;
const price=parseFloat(document.getElementById("price").value)||0;
 
if(!name) return;
 
db.collection("ricardoCarolApp")
.doc("lista")
.collection("items")
.add({
name,
qty,
price,
addedBy:user,
date:new Date()
});
 
document.getElementById("name").value="";
document.getElementById("qty").value="";
document.getElementById("price").value="";
 
}
 
function start(){
 
db.collection("ricardoCarolApp")
.doc("lista")
.collection("items")
.onSnapshot(snap=>{
 
const list=document.getElementById("list");
 
list.innerHTML="";
 
let total=0;
 
snap.forEach(doc=>{
 
const item=doc.data();
 
total+=item.qty*item.price;
 
const li=document.createElement("li");
 
li.innerHTML=`
<div>
<input type="checkbox" onclick="buyItem('${doc.id}')">
<strong>${item.qty}x ${item.name}</strong>
<div class="small">${item.addedBy} • €${item.price}</div>
</div>
`;
 
list.appendChild(li);
 
});
 
document.getElementById("total").innerText="Total: €"+total.toFixed(2);
 
});
 
}
 
function buyItem(id){
 
const ref=db.collection("ricardoCarolApp")
.doc("lista")
.collection("items")
.doc(id);
 
ref.get().then(doc=>{
 
const item=doc.data();
 
db.collection("ricardoCarolApp")
.doc("lista")
.collection("history")
.add(item);
 
ref.delete();
 
});
 
}
 
</script>
 
</body>
</html>
