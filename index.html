<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>App Braga</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="mobile-shell">
    <aside id="sidebar" class="mobile-sidebar">
      <div class="sidebar-top">
        <div>
          <h2>App Braga</h2>
          <p>Versão iPhone</p>
        </div>
        <button class="icon-btn close-btn" onclick="fecharMenu()">✕</button>
      </div>

      <nav class="mobile-nav">
        <button class="nav-link active" onclick="mostrarPagina('dashboard', this)">🏠 Dashboard</button>
        <button class="nav-link" onclick="mostrarPagina('pistolas', this)">📦 Pistolas CK65</button>
        <button class="nav-link" onclick="mostrarPagina('portas', this)">🌐 Portas Rede</button>
        <button class="nav-link" onclick="mostrarPagina('users', this)">👤 Users</button>
        <button class="nav-link" onclick="mostrarPagina('config', this)">⚙️ Configurações</button>
      </nav>
    </aside>

    <div id="overlay" class="overlay" onclick="fecharMenu()"></div>

    <main class="mobile-main">
      <header class="mobile-topbar">
        <button class="icon-btn" onclick="abrirMenu()">☰</button>
        <div class="topbar-title-wrap">
          <h1 id="pageTitle">Dashboard</h1>
          <p class="subtitle">App Braga iPhone</p>
        </div>
        <label class="switch-mini">
          <input type="checkbox" id="darkSwitch" />
          <span>🌙</span>
        </label>
      </header>

      <!-- DASHBOARD -->
      <section id="page-dashboard" class="page active-page">
        <div class="mobile-stats-grid">
          <div class="stat-card">
            <span>Pistolas</span>
            <strong id="countPistolasDashboard">0</strong>
          </div>
          <div class="stat-card">
            <span>Portas</span>
            <strong id="countPortasDashboard">0</strong>
          </div>
          <div class="stat-card">
            <span>Users</span>
            <strong id="countUsersDashboard">0</strong>
          </div>
        </div>

        <div class="panel">
          <h3>Resumo rápido</h3>
          <div class="dashboard-mobile-list">
            <div class="dashboard-mini-card">
              <span class="mini-label">Pistolas Reserva</span>
              <strong id="countReservaDashboard">0</strong>
            </div>
            <div class="dashboard-mini-card">
              <span class="mini-label">Portas Ocupadas</span>
              <strong id="countPortasUsadasDashboard">0</strong>
            </div>
            <div class="dashboard-mini-card">
              <span class="mini-label">Users com MO365</span>
              <strong id="countUsersMO365Dashboard">0</strong>
            </div>
          </div>
        </div>
      </section>

      <!-- PISTOLAS -->
      <section id="page-pistolas" class="page">
        <div class="mobile-stats-grid">
          <div class="stat-card">
            <span>Total</span>
            <strong id="countPistolas">0</strong>
          </div>
          <div class="stat-card">
            <span>Turno Dia</span>
            <strong id="countPistolasDia">0</strong>
          </div>
          <div class="stat-card">
            <span>Reserva</span>
            <strong id="countPistolasReserva">0</strong>
          </div>
        </div>

        <div class="panel">
          <div class="mobile-filters">
            <input
              id="searchPistolas"
              type="text"
              placeholder="Pesquisar pistolas..."
              oninput="filtrarPistolas(this.value)"
            />
            <select id="filterTurnoPistolas" onchange="filtrarPistolasComFiltros()">
              <option value="">Todos os turnos</option>
              <option value="dia">Dia</option>
            </select>
            <select id="filterTipoPistolas" onchange="filtrarPistolasComFiltros()">
              <option value="">Todos os tipos</option>
              <option value="ativa">Ativa</option>
              <option value="reserva">Reserva</option>
            </select>
          </div>
        </div>

        <div id="listaPistolas" class="mobile-cards-list"></div>
      </section>

      <!-- PORTAS -->
      <section id="page-portas" class="page">
        <div class="mobile-stats-grid">
          <div class="stat-card">
            <span>Total</span>
            <strong id="countPortas">0</strong>
          </div>
          <div class="stat-card">
            <span>Ocupadas</span>
            <strong id="countPortasUsadas">0</strong>
          </div>
          <div class="stat-card">
            <span>Livres</span>
            <strong id="countPortasLivres">0</strong>
          </div>
          <div class="stat-card">
            <span>Sem User</span>
            <strong id="countPortasSemUser">0</strong>
          </div>
        </div>

        <div class="panel">
          <div class="mobile-filters">
            <input
              id="searchPortas"
              type="text"
              placeholder="Pesquisar portas..."
              oninput="filtrarPortas(this.value)"
            />
            <select id="filterEstadoPortas" onchange="filtrarPortasComEstado()">
              <option value="">Todos os estados</option>
              <option value="ocupado">Ocupadas</option>
              <option value="livre">Livres</option>
              <option value="semUser">Sem user</option>
            </select>
          </div>
        </div>

        <div id="listaPortas" class="mobile-cards-list"></div>
      </section>

      <!-- USERS -->
      <section id="page-users" class="page">
        <div class="mobile-stats-grid">
          <div class="stat-card">
            <span>Total</span>
            <strong id="countUsers">0</strong>
          </div>
          <div class="stat-card">
            <span>MO365</span>
            <strong id="countUsersMO365">0</strong>
          </div>
          <div class="stat-card">
            <span>Pistola</span>
            <strong id="countUsersPistola">0</strong>
          </div>
          <div class="stat-card">
            <span>TeamViewer</span>
            <strong id="countUsersTV">0</strong>
          </div>
        </div>

        <div class="panel">
          <div class="mobile-filters">
            <input
              id="searchUsers"
              type="text"
              placeholder="Pesquisar users..."
              oninput="filtrarUsers(this.value)"
            />
            <select id="filterUsersMO365" onchange="filtrarUsersComFiltros()">
              <option value="">MO365: Todos</option>
              <option value="sim">Com MO365</option>
              <option value="nao">Sem MO365</option>
            </select>
            <select id="filterUsersPistola" onchange="filtrarUsersComFiltros()">
              <option value="">Pistola: Todos</option>
              <option value="sim">Com Pistola</option>
              <option value="nao">Sem Pistola</option>
            </select>
          </div>
        </div>

        <div id="listaUsers" class="mobile-cards-list"></div>
      </section>

      <!-- CONFIG -->
      <section id="page-config" class="page">
        <div class="panel">
          <h3>Configurações</h3>
          <div class="config-row">
            <span>Dark mode</span>
            <label class="switch-mini">
              <input type="checkbox" id="darkSwitchConfig" />
              <span>Ativar</span>
            </label>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="app-version-mini">v1.1.0</div>

  <script src="app.js"></script>
</body>
</html>
