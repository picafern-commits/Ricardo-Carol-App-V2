<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lista - Ricardo&Carol</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
body{font-family:Arial,sans-serif;margin:20px;background:#1e1e1e;color:white;}
h2{text-align:center;}
.container{max-width:500px;margin:auto;background:#2b2b2b;padding:20px;border-radius:10px;}
.card{background:#333;padding:15px;border-radius:8px;margin-bottom:15px;}
input,button,select{padding:10px;margin:5px 0;font-size:16px;border-radius:5px;border:none;}
button{cursor:pointer;color:white;}
button:hover{opacity:0.9;}
ul{list-style:none;padding:0;}
li{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #444;}
.flex{display:flex;justify-content:space-between;align-items:center;}
.total{margin-top:10px;font-weight:bold;text-align:right;}
input[type=number]{width:60px;}
select{width:calc(100% - 10px); /* mesmo tamanho do botão adicionar */ margin-bottom:5px;}
.small{font-size:12px;color:#ccc;margin-left:5px;}
.quick-buttons button{margin-right:5px;}
.user-color-user1{color:#ffd700;}
.user-color-user2{color:#00ff00;}
.user-color-user3{color:#00ffff;}
.user-color-user4{color:#ff00ff;}
.user-color-user5{color:#ffa500;}
</style>
</head>
<body>
<div class="container">
<h2>🛒 Ricardo&Carol</h2>

<!-- Formulário de adicionar produtos -->
<div class="card">
  <input id="name" placeholder="Produto">
  <input id="qty" type="number" placeholder="Quantidade">
  <input id="price" type="number" placeholder="Preço">
  <select id="store">
    <option value="Action">Action</option>
    <option value="Continente">Continente</option>
    <option value="Lidl">Lidl</option>
    <option value="Mercadona">Mercadona</option>
    <option value="Pingo Doce">Pingo Doce</option>
  </select>
  <button onclick="addItem()">Adicionar</button>
  <button style="background:#ff3b30" onclick="clearList()">Apagar Lista</button>
  <button style="background:#ff9500" onclick="goHistory()">Histórico</button>
</div>

<!-- Lista de produtos -->
<div class="card">
  <h3>Lista</h3>
  <ul id="list"></ul>
  <div class="total" id="total"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebaseConfig.js"></script>
<script>
let user = sessionStorage.getItem("user");
if(!user){ window.location.href="login.html"; }

const itemsRef = db.collection("ricardoCarolApp").doc("lista").collection("items");
const historyRef = db.collection("ricardoCarolApp").doc("lista").collection("history");

// Adiciona produto
function addItem(nameManual){
  const name = nameManual||document.getElementById("name").value.trim();
  const qty = parseInt(document.getElementById("qty").value)||1;
  const price = parseFloat(document.getElementById("price").value)||0;
  const store = document.getElementById("store").value;
  if(!name) return;
  itemsRef.add({name, qty, price, store, addedBy:user, date:new Date()});
  if(!nameManual){ 
    document.getElementById("name").value="";
    document.getElementById("qty").value="";
    document.getElementById("price").value="";
  }
}

function clearList(){ if(confirm("Apagar toda a lista?")){ itemsRef.get().then(s=>s.forEach(d=>d.ref.delete())); } }
function goHistory(){ window.location.href="history.html"; }

itemsRef.onSnapshot(snap=>{
  const list=document.getElementById("list");
  list.innerHTML="";
  let total=0;
  snap.forEach(doc=>{
    const item=doc.data();
    total+=item.qty*item.price;
    const li=document.createElement("li");
    const colorClass="user-color-"+item.addedBy.replace(/ /g,"");
    li.innerHTML=`<div class="flex">
      <input type="checkbox" onclick="buyItem('${doc.id}')">
      <strong>${item.qty}x ${item.name}</strong>
      <span class="small">[${item.store}]</span>
    </div>
    <div class="flex">
      <input type="number" value="${item.price}" onchange="editPrice('${doc.id}',this.value)">
      <div class="small ${colorClass}">${item.addedBy}</div>
    </div>`;
    list.appendChild(li);
  });
  document.getElementById("total").innerText="Total: €"+total.toFixed(2);
});

// Marca como comprado e envia para histórico
function buyItem(id){
  itemsRef.doc(id).get().then(doc=>{
    const itemData = doc.data();
    historyRef.add({
      name: itemData.name,
      qty: itemData.qty,
      price: itemData.price,
      store: itemData.store,
      addedBy: itemData.addedBy,
      date: new Date()
    });
    itemsRef.doc(id).delete();
  });
}
function editPrice(id,newPrice){ itemsRef.doc(id).update({price:parseFloat(newPrice)||0}); }
</script>
</body>
</html>
