<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo&Carol</title><style>
body{
  font-family:-apple-system,BlinkMacSystemFont;
  background:#1c1c1e;
  color:white;
  margin:0;
  padding:20px;
}
 
.container{
  max-width:520px;
  margin:auto;
  background:#2c2c2e;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
 
h1{
  text-align:center;
  margin-bottom:15px;
}
 
input, select{
  width:100%;
  padding:10px;
  margin:4px 0;
  border-radius:10px;
  border:none;
  font-size:14px;
  background:#3a3a3c;
  color:white;
}
 
input::placeholder{
  color:#aaa;
}
 
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#0a84ff;
  color:white;
  font-size:14px;
  margin-top:6px;
}
 
button.red{
  background:#ff453a;
}
 
.row{
  display:flex;
  gap:8px;
}
 
.qty, .price{
  width:80px;
}
 
ul{
  list-style:none;
  padding:0;
  margin:6px 0;
}
 
li{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  border-bottom:1px solid #444;
}
 
.done{
  text-decoration:line-through;
  color:gray;
}
 
.price{
  font-size:12px;
  color:#ccc;
}
 
.total{
  font-size:16px;
  font-weight:bold;
  margin-top:10px;
}
 
.tabs{
  display:flex;
  justify-content:space-around;
  margin-bottom:10px;
}
 
.tab{
  padding:8px 16px;
  border-radius:10px;
  background:#3a3a3c;
  cursor:pointer;
}
 
.tab.active{
  background:#0a84ff;
}
 
.history{
  font-size:12px;
  color:#bbb;
}
 
</style></head><body><div class="container"><h1>🛒 Ricardo&Carol</h1><div class="tabs">
  <div class="tab active" data-cat="Supermercado" onclick="switchTab(event)">Supermercado</div>
  <div class="tab" data-cat="Casa" onclick="switchTab(event)">Casa</div>
  <div class="tab" data-cat="Farmácia" onclick="switchTab(event)">Farmácia</div>
  <div class="tab" data-cat="Outros" onclick="switchTab(event)">Outros</div>
</div><input id="search" placeholder="Pesquisar..." onkeyup="render()"><h3>Adicionar Produto</h3><input id="name" placeholder="Produto"><div class="row">
  <input id="qty" class="qty" type="number" placeholder="Qtd" min="1">
  <input id="price" class="price" type="number" placeholder="Preço €" min="0" step="0.01">
</div><select id="category">
  <option>Supermercado</option>
  <option>Casa</option>
  <option>Farmácia</option>
  <option>Outros</option>
</select><button onclick="addItem()">Adicionar</button>
<button onclick="voice()">🎤 Adicionar por voz</button>
 
<h3>Lista</h3>
<ul id="list"></ul>
<div class="total" id="total"></div>
<button class="red" onclick="clearList()">Limpar lista</button><h3>Histórico</h3>
<ul id="history"></ul>
<button class="red" onclick="clearHistory()">Apagar Histórico</button></div><script>
let items = JSON.parse(localStorage.getItem("items")||"[]")
let history = JSON.parse(localStorage.getItem("history")||"[]")
let currentTab = "Supermercado"
 
function save(){
  localStorage.setItem("items",JSON.stringify(items))
  localStorage.setItem("history",JSON.stringify(history))
  render()
}
 
function addItem(){
  let name = document.getElementById("name").value
  let qty = parseInt(document.getElementById("qty").value)||1
  let price = parseFloat(document.getElementById("price").value)||0
  let cat = document.getElementById("category").value
  if(!name) return
  items.push({name, qty, price, category: cat})
  document.getElementById("name").value=""
  document.getElementById("qty").value=""
  document.getElementById("price").value=""
  save()
}
 
function toggle(i){
  let item = items[i]
  history.unshift({
    name:item.name,
    qty:item.qty,
    date:new Date().toLocaleDateString(),
    category:item.category
  })
  items.splice(i,1)
  save()
}
 
function removeItem(i){
  items.splice(i,1)
  save()
}
 
function clearList(){
  if(confirm("Limpar lista?")){
    items=[]
    save()
  }
}
 
function clearHistory(){
  if(confirm("Apagar histórico?")){
    history=[]
    save()
  }
}
 
function render(){
  let list = document.getElementById("list")
  let hist = document.getElementById("history")
  let search = document.getElementById("search").value.toLowerCase()
  list.innerHTML=""
  hist.innerHTML=""
  let total = 0
 
  items.filter(x=>x.name.toLowerCase().includes(search) && x.category===currentTab)
  .forEach((item,i)=>{
    total += item.price*item.qty
    let li = document.createElement("li")
    li.innerHTML = `
      <div>
        <input type="checkbox" onchange="toggle(${i})">
        ${item.qty}x ${item.name}
        <div class="price">${item.category} • €${item.price}</div>
      </div>
      <button onclick="removeItem(${i})">❌</button>
    `
    list.appendChild(li)
  })
 
  document.getElementById("total").innerText="Total estimado: €"+total.toFixed(2)
 
  history.filter(x=>x.category===currentTab)
  .forEach(item=>{
    let li = document.createElement("li")
    li.innerHTML=`${item.qty}x ${item.name} - ${item.date}`
    hist.appendChild(li)
  })
}
 
function switchTab(e){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
  e.target.classList.add("active")
  currentTab = e.target.dataset.cat
  render()
}
 
function voice(){
  if(!('webkitSpeechRecognition' in window)){
    alert("Reconhecimento de voz não disponível neste navegador")
    return
  }
  let rec = new webkitSpeechRecognition()
  rec.lang="pt-PT"
  rec.onresult = function(e){
    document.getElementById("name").value = e.results[0][0].transcript
  }
  rec.start()
}
 
render()
</script></body>
</html>
