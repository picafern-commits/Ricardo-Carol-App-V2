<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ricardo&Carol</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:-apple-system,BlinkMacSystemFont;background:#1c1c1e;color:white;margin:0;padding:18px;touch-action: manipulation;}
.container{max-width:540px;margin:auto;background:#2c2c2e;border-radius:20px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,0.35);}
h1{text-align:center;margin-bottom:14px}
input{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none;font-size:14px;background:#3a3a3c;color:white}
input::placeholder{color:#aaa}
button{width:100%;padding:10px;border:none;border-radius:10px;background:#0a84ff;color:white;font-size:14px;margin-top:7px}
button.red{background:#ff453a}
.row{display:flex;gap:8px}
.qty,.price{width:80px}
ul{list-style:none;padding:0;margin:8px 0}
li{display:flex;justify-content:space-between;align-items:center;padding:9px;border-bottom:1px solid #444}
.price{font-size:12px;color:#ccc}
.total{font-size:17px;font-weight:bold;margin-top:10px}
.history{font-size:12px;color:#bbb}
#scannerOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:999;align-items:center;justify-content:center;}
#scannerOverlay video{width:100%;height:auto;object-fit:cover;border-radius:0;}
#closeScanner{position:absolute;top:20px;right:20px;background:#ff3b30;color:white;border:none;padding:10px;border-radius:10px;font-size:16px;z-index:1000;cursor:pointer;}
</style>
</head>
<body>
<div class="container">
 
<h1>🛒 Ricardo&Carol</h1>
 
<!-- LOGIN -->
<div id="login">
  <h3>Qual é o teu nome?</h3>
  <input id="username" placeholder="Escreve o teu nome">
  <button onclick="login()">Entrar</button>
</div>
 
<!-- APP PRINCIPAL -->
<div id="app" style="display:none">
  <input id="search" placeholder="Pesquisar..." onkeyup="render()">
 
  <h3>Adicionar Produto</h3>
  <input id="name" placeholder="Produto">
  <div class="row">
    <input id="qty" class="qty" type="number" placeholder="Qtd" min="1">
    <input id="price" class="price" type="number" placeholder="Preço €" min="0" step="0.01">
  </div>
  <button onclick="addItem()">Adicionar</button>
 
  <h3>Adicionar Código de Barras com a Câmera</h3>
  <button onclick="openScanner()">📷 Ler código de barras</button>
 
  <h3>Lista</h3>
  <ul id="list"></ul>
  <div class="total" id="total"></div>
  <button class="red" onclick="clearList()">Limpar lista</button>
 
  <h3>Histórico</h3>
  <ul id="history"></ul>
  <button class="red" onclick="clearHistory()">Apagar Histórico</button>
 
  <button onclick="logout()">Sair</button>
</div>
 
<!-- SCANNER -->
<div id="scannerOverlay"></div>
 
<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
 
<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDIC4TRTrPXegpctUMzHMp3wx5di7ziw3U",
  authDomain: "ricardocarolapp.firebaseapp.com",
  projectId: "ricardocarolapp",
  storageBucket: "ricardocarolapp.firebasestorage.app",
  messagingSenderId: "502898050812",
  appId: "1:502898050812:web:d270e03827d11c101e3979"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
 
// LOGIN GUARDADO
let user = localStorage.getItem("user") || "";
if(user){ document.getElementById("login").style.display="none"; document.getElementById("app").style.display="block"; render(); }
 
function login(){
  const uname = document.getElementById("username").value.trim();
  if(!uname){ alert("Escreve o teu nome"); return; }
  user = uname;
  localStorage.setItem("user", user);
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  render();
}
 
function logout(){
  localStorage.removeItem("user");
  user="";
  document.getElementById("login").style.display="block";
  document.getElementById("app").style.display="none";
}
 
// ADICIONAR ITEM
function addItem(){
  if(!user) return;
  const name=document.getElementById("name").value;
  const qty=parseInt(document.getElementById("qty").value)||1;
  const price=parseFloat(document.getElementById("price").value)||0;
  if(!name) return;
  db.collection("users").doc(user).collection("items").add({name, qty, price, addedBy:user});
  document.getElementById("name").value="";
  document.getElementById("qty").value="";
  document.getElementById("price").value="";
  render();
}
 
// TOGGLE CHECKED
function toggle(id,item){
  if(!user) return;
  db.collection("users").doc(user).collection("items").doc(id).delete();
  db.collection("users").doc(user).collection("history").add({...item, date:new Date().toLocaleDateString()});
  render();
}
 
function removeItem(id){
  if(!user) return;
  db.collection("users").doc(user).collection("items").doc(id).delete().then(render);
}
 
function clearList(){
  if(!user) return;
  db.collection("users").doc(user).collection("items").get().then(snap=>snap.forEach(d=>d.ref.delete())).then(render);
}
 
function clearHistory(){
  if(!user) return;
  db.collection("users").doc(user).collection("history").get().then(snap=>snap.forEach(d=>d.ref.delete())).then(render);
}
 
// RENDER
function render(){
  if(!user) return;
  const listEl=document.getElementById("list");
  const histEl=document.getElementById("history");
  const totalEl=document.getElementById("total");
  const search=document.getElementById("search").value.toLowerCase();
  listEl.innerHTML=""; histEl.innerHTML="";
  let total=0;
 
  db.collection("users").doc(user).collection("items").get()
    .then(snap=>{
      snap.forEach(doc=>{
        const item=doc.data();
        total+=item.qty*item.price;
        if(item.name.toLowerCase().includes(search)){
          const li=document.createElement("li");
          li.innerHTML=`<div>
            <input type="checkbox" onchange='toggle("${doc.id}",${JSON.stringify(item)})'>
            ${item.qty}x ${item.name} <div class="price">Adicionado por: ${item.addedBy} • €${item.price}</div>
          </div>
          <button onclick='removeItem("${doc.id}")'>❌</button>`;
          listEl.appendChild(li);
        }
      });
      totalEl.innerText="Total estimado: €"+total.toFixed(2);
    });
 
  db.collection("users").doc(user).collection("history").get()
    .then(snap=>{
      snap.forEach(doc=>{
        const item=doc.data();
        const li=document.createElement("li");
        li.innerText=`${item.qty}x ${item.name} - ${item.addedBy || "?"} - ${item.date}`;
        histEl.appendChild(li);
      });
    });
}
 
// SCANNER COM CÂMERA E API DE PRODUTO
async function openScanner() {
  const overlay = document.getElementById("scannerOverlay");
  overlay.innerHTML = '<video id="scannerVideo" autoplay playsinline></video><button id="closeScanner" onclick="closeScanner()">X</button>';
  overlay.style.display = "flex";
 
  const video = document.getElementById("scannerVideo");
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  video.srcObject = stream;
 
  if(!("BarcodeDetector" in window)){
    alert("BarcodeDetector não suportado neste dispositivo.");
    return;
  }
 
  const detector = new BarcodeDetector({formats: ["ean_13","ean_8","code_128"]});
 
  const detect = async ()=>{
    try{
      const barcodes = await detector.detect(video);
      if(barcodes.length>0){
        const code = barcodes[0].rawValue;
        closeScanner();
        fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`)
          .then(res=>res.json())
          .then(data=>{
            const name = data.product?.product_name || "Produto desconhecido";
            db.collection("users").doc(user).collection("items").add({name, qty:1, price:0, addedBy:user});
            render();
            alert(`Produto adicionado: ${name}`);
          })
          .catch(()=>{alert("Não foi possível buscar o produto.");});
      } else {
        requestAnimationFrame(detect);
      }
    } catch(err){
      console.log(err);
      requestAnimationFrame(detect);
    }
  };
  detect();
}
 
function closeScanner(){
  const overlay = document.getElementById("scannerOverlay");
  const video = document.getElementById("scannerVideo");
  if(video && video.srcObject){
    const tracks = video.srcObject.getTracks();
    tracks.forEach(t=>t.stop());
  }
  overlay.style.display="none";
  overlay.innerHTML="";
}
</script>
</body>
</html>
