<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Login - Ricardo&Carol</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="card">
    <h2>🛒 Ricardo&Carol</h2>
    <h3>Escolhe o utilizador</h3>
    <button onclick="login('Ricardo')">Ricardo</button>
    <button onclick="login('Carol')">Carol</button>
    <button onclick="login('Maria')">Maria</button>
    <button onclick="login('Pedro')">Jorge</button>
  </div>
</div>
 
<script>
function login(name){
  localStorage.setItem("user", name);
  window.location.href="index.html";
}
 
// Redireciona automaticamente se já estiver logado
let user = localStorage.getItem("user");
if(user){ window.location.href="index.html"; }
</script>
</body>
</html>
