<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Login - Ricardo&Carol</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<div class="container">
  <div class="card">
    <h2>🛒 Ricardo&Carol</h2>
    <h3>Escolhe o teu nome</h3>
    <button onclick="login('Ricardo')">Ricardo</button>
    <button onclick="login('Carol')">Carol</button>
    <button onclick="login('João')">João</button>
    <button onclick="login('Maria')">Maria</button>
    <button onclick="login('Pedro')">Pedro</button>
  </div>
</div>

<script>
function login(name){
  sessionStorage.setItem("user", name); // só dura enquanto a sessão estiver aberta
  window.location.href="index.html";
}

if('serviceWorker' in navigator){ navigator.serviceWorker.register('service-worker.js'); }
</script>
</body>
</html>
